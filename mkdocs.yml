site_name: Musubito
site_description: Deterministic Python runtime for relational execution lineage DAGs.
repo_name: daltieri86/musubito
repo_url: https://github.com/daltieri86/musubito

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.instant
    - content.code.copy

nav:
  - Overview: index.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
